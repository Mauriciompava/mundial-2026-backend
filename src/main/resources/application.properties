spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mundial_2026?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:M4uropava}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}

# Stability and Debugging
spring.main.allow-bean-definition-overriding=true
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Allow large Base64 uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-post-size=10MB
server.tomcat.max-swallow-size=10MB

# Tomcat & Memory Optimization for Low RAM (Railway Hobby Plan)
server.tomcat.threads.max=20
spring.main.lazy-initialization=true

